<!DOCTYPE html>
<html>

<head>

    <title>Edit Job</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f8f9fa;
        }

        .card{
            border-radius:15px;
        }

        h2{
            color:#0D47A1;
            font-weight:bold;
        }

        textarea{
            resize:none;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="card shadow p-4">

        <h2 class="mb-4">
            Edit Job
        </h2>

        <form action="/update-job/{{ job['id'] }}" method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Job Title
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="title"
                    value="{{ job['title'] }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Organization
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="organization"
                    value="{{ job['organization'] }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Qualification
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="qualification"
                    value="{{ job['qualification'] }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Age Limit
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="age_limit"
                    value="{{ job['age_limit'] }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Last Date
                </label>

                <input
                    type="date"
                    class="form-control"
                    name="last_date"
                    value="{{ job['last_date'] }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Official Website Link
                </label>

                <input
                    type="url"
                    class="form-control"
                    name="official_link"
                    value="{{ job['official_link'] }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Notification PDF Link
                </label>

                <input
                    type="url"
                    class="form-control"
                    name="notification_link"
                    value="{{ job['notification_link'] }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Description
                </label>

                <textarea
                    class="form-control"
                    rows="6"
                    name="description"
                    required>{{ job['description'] }}</textarea>

            </div>

            <button
                type="submit"
                class="btn btn-success">

                Update Job

            </button>

            <a href="/admin"
               class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

</body>

</html>
