<!DOCTYPE html>
<html>

<head>

    <title>Admin Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f8f9fa;
        }

        .login-card{
            max-width:450px;
            margin:auto;
            margin-top:100px;
            border-radius:15px;
        }

        h2{
            color:#0D47A1;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card shadow login-card p-4">

        <h2 class="text-center mb-4">
            Admin Login
        </h2>

        <form action="/login" method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>

            </div>

            <button
                class="btn btn-primary w-100">

                Login

            </button>

        </form>

    </div>

</div>

</body>

</html>
