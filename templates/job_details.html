<!DOCTYPE html>
<html>

<head>

    <title>{{ job['title'] }}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f8f9fa;
        }

        .card{
            border-radius:15px;
        }

        h1{
            color:#0D47A1;
            font-weight:bold;
        }

        .label{
            font-weight:bold;
            color:#0D47A1;
        }

        .btn-space{
            margin-right:10px;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="card shadow p-4">

        <h1 class="mb-4">
            {{ job['title'] }}
        </h1>

        <hr>

        <p>
            <span class="label">Organization:</span>
            {{ job['organization'] }}
        </p>

        <p>
            <span class="label">Qualification:</span>
            {{ job['qualification'] }}
        </p>

        <p>
            <span class="label">Age Limit:</span>
            {{ job['age_limit'] }}
        </p>

        <p>
            <span class="label">Last Date:</span>
            {{ job['last_date'] }}
        </p>

        <hr>

        <h4>Description</h4>

        <p>
            {{ job['description'] }}
        </p>

        <hr>

        <a
            href="{{ job['notification_link'] }}"
            target="_blank"
            class="btn btn-primary btn-space">

            Official Notification

        </a>

        <a
            href="{{ job['official_link'] }}"
            target="_blank"
            class="btn btn-success btn-space">

            Apply on Official Website

        </a>

        <a
            href="/"
            class="btn btn-secondary">

            Back

        </a>

    </div>

</div>

</body>

</html>
