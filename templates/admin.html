<!DOCTYPE html>
<html>

<head>

    <title>Admin Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f8f9fa;
        }

        .card{
            border-radius:15px;
        }

        h1{
            color:#0D47A1;
            font-weight:bold;
        }

        textarea{
            resize:none;
        }

        .table td,
        .table th{
            vertical-align:middle;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-5">

        <h1>
            Admin Dashboard
        </h1>

        <a
            href="/logout"
            class="btn btn-danger">

            Logout

        </a>

    </div>

    <!-- Add Job -->

    <div class="card shadow p-4">

        <h3 class="mb-4">
            Add New Job
        </h3>

        <form action="/add-job" method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Job Title
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="title"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Organization
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="organization"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Qualification
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="qualification"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Age Limit
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="age_limit"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Last Date
                </label>

                <input
                    type="date"
                    class="form-control"
                    name="last_date"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Official Website Link
                </label>

                <input
                    type="url"
                    class="form-control"
                    name="official_link"
                    placeholder="https://..."
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Notification PDF Link
                </label>

                <input
                    type="url"
                    class="form-control"
                    name="notification_link"
                    placeholder="https://..."
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Description
                </label>

                <textarea
                    class="form-control"
                    rows="5"
                    name="description"
                    required></textarea>

            </div>

            <button
                type="submit"
                class="btn btn-primary">

                Add Job

            </button>

        </form>

    </div>

    <!-- Existing Jobs -->

    <div class="card shadow mt-5 p-4">

        <h3 class="mb-4">
            Existing Jobs
        </h3>

        <div class="table-responsive">

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>ID</th>
                        <th>Title</th>
                        <th>Organization</th>
                        <th>Qualification</th>
                        <th>Last Date</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody>

                {% for job in jobs %}

                    <tr>

                        <td>{{ job['id'] }}</td>

                        <td>{{ job['title'] }}</td>

                        <td>{{ job['organization'] }}</td>

                        <td>{{ job['qualification'] }}</td>

                        <td>{{ job['last_date'] }}</td>

                        <td>

                            <a href="/edit-job/{{ job['id'] }}"
                               class="btn btn-warning btn-sm">
                                Edit
                            </a>

                            <a href="/delete-job/{{ job['id'] }}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Are you sure you want to delete this job?')">

                                Delete

                            </a>

                        </td>

                    </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
