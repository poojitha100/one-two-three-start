<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f9fa;
        }

        .card{
            border-radius:15px;
        }

        h1{
            color:#0D47A1;
            font-weight:bold;
        }

        .table td,
        .table th{
            vertical-align: middle;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <h1 class="text-center mb-5">Admin Dashboard</h1>

    <!-- Add Job Card -->
    <div class="card shadow p-4">

        <h3 class="mb-4">Add New Job</h3>

        <form action="/add-job" method="POST">

            <div class="mb-3">
                <label class="form-label">Job Title</label>

                <input
                    type="text"
                    class="form-control"
                    name="title"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Details</label>

                <input
                    type="text"
                    class="form-control"
                    name="details"
                    required>
            </div>

            <button type="submit" class="btn btn-primary">
                Add Job
            </button>

        </form>

    </div>

    <!-- Existing Jobs Card -->
    <div class="card shadow mt-5 p-4">

        <h3 class="mb-4">Existing Jobs</h3>

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Job Title</th>
                    <th>Details</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody>

                {% for job in jobs %}

                <tr>

                    <td>{{ job['id'] }}</td>

                    <td>{{ job['title'] }}</td>

                    <td>{{ job['details'] }}</td>

                    <td>

                        <a href="/edit-job/{{ job['id'] }}" class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <a href="/delete-job/{{ job['id'] }}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this job?')">
                            Delete
                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
